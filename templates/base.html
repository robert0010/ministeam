<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ministeam{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="navbar">
    <div class="nav-left">
        <div class="logo">MINISTEAM</div>
        <nav>
            <a href="{{ url_for('index') }}">Loja</a>
            <a href="{{ url_for('cart') }}">Carrinho</a>
        </nav>
    </div>

    <div class="nav-right">
        <div class="user-profile">
            <img src="{{ url_for('static', filename='images/profile.jpg') }}" alt="Perfil" onerror="this.style.display='none'">
        </div>
    </div>
</header>

<main class="container">
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
        {% for message in messages %}
        <div class="flash {% if 'sucesso' in message %}success{% endif %}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
